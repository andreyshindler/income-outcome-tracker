name: CI/CD

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: receipt-tracker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: receipt-tracker/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Byte-compile sources
        run: python -m compileall app

      - name: Run tests
        run: pytest -q

  # Builds on every run to catch Dockerfile breakage, and publishes to GHCR on
  # main/tags as a versioned artifact + history. NOTE: the `deploy` job below
  # rebuilds on the server (`up -d --build`, matching the README's flow), so it
  # does not pull this image. The GHCR image is for record/rollback and anyone
  # who'd rather `docker pull` than build; switch deploy to pull-based only if
  # you also give the server GHCR credentials.
  image:
    name: Build image (publish on main/tags)
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Only authenticate when we're actually going to push.
      - name: Log in to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/receipt-tracker
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build (and push on main/tags)
        uses: docker/build-push-action@v6
        with:
          context: receipt-tracker
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to srv1515969
    needs: image
    # Dormant until you opt in: set repo variable DEPLOY_ENABLED=true and add the
    # DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY secrets. Until then CI stays green.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Pull & restart over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ~/receipt-tracker
            git pull --ff-only
            docker compose up -d --build
            docker image prune -f
