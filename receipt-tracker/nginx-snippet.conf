# Add this location block to the same nginx server block already handling
# /jarvis/, /list/, /stats/ on srv1515969.

location /receipts-api/ {
    proxy_pass http://127.0.0.1:8431/receipts-api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
